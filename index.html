<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chatbot Ademicon | Atendimento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

#chat{
  width:360px;
  max-width:95%;
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  overflow:hidden;
}

.header{
  background:#c00000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.body{
  padding:15px;
  height:380px;
  overflow-y:auto;
}

.bot,.user{
  padding:10px 14px;
  border-radius:14px;
  margin-bottom:10px;
  max-width:80%;
  font-size:14px;
}

.bot{background:#f1f1f1;}
.user{background:#c00000;color:#fff;margin-left:auto;}

.buttons{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  cursor:pointer;
}

button:hover{background:#c00000;}

input,select{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

.whatsapp{
  background:#25D366;
}
</style>
</head>

<body>

<div class="overlay">
<div id="chat">
  <div class="header">🤖 Atendimento Ademicon</div>
  <div class="body" id="msgs">

    <div class="bot">
      Olá! 😊 Vamos começar.<br>Qual seu nome?
      <input id="nome">
      <div class="buttons">
        <button onclick="saveName()">Continuar</button>
      </div>
    </div>

  </div>
</div>
</div>

<script>

const msgs=document.getElementById('msgs');

let nome='',fone='',tipo='',valor=0,parcelaFinal=0;

const TAXA_IMOVEL=0.242;
const TAXA_VEICULO=0.16;

const moeda=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

function bot(t){
  let d=document.createElement('div');
  d.className='bot';
  d.innerHTML=t;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function user(t){
  let d=document.createElement('div');
  d.className='user';
  d.innerText=t;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function saveName(){
  nome=document.getElementById('nome').value;
  if(!nome)return;
  user(nome);

  bot(`Qual seu WhatsApp?
  <input id="fone">
  <div class="buttons">
    <button onclick="saveFone()">Continuar</button>
  </div>`);
}

function saveFone(){
  fone=document.getElementById('fone').value;
  if(!fone)return;
  user(fone);

  bot(`O que deseja simular?
  <div class="buttons">
    <button onclick="imovel()">🏠 Imóvel</button>
    <button onclick="veiculo()">🚗 Veículo</button>
  </div>`);
}

function normaliza(v){
  v=parseFloat(v);
  if(v<1000)v*=1000;
  return v;
}

function imovel(){
  tipo="Imóvel";
  user('Imóvel');

  bot(`Valor do crédito:
  <input id="vi" type="number">
  Prazo:
  <select id="pi">
    <option value="220">220</option>
    <option value="180">180</option>
  </select>
  <div class="buttons">
    <button onclick="calcI()">Calcular</button>
  </div>`);
}

function calcI(){
  let v=normaliza(document.getElementById('vi').value);
  let p=parseInt(document.getElementById('pi').value);

  valor=v;
  parcelaFinal=(v*(1+TAXA_IMOVEL))/p;

  bot(`💰 Parcela: <b>${moeda(parcelaFinal)}</b>
  <div class="buttons">
    <button class="whatsapp" onclick="zap()">📲 Falar no WhatsApp</button>
  </div>`);
}

function veiculo(){
  tipo="Veículo";
  user('Veículo');

  bot(`Valor:
  <input id="vv" type="number">
  Prazo:
  <select id="pv">
    <option value="100">100</option>
    <option value="60">60</option>
  </select>
  <div class="buttons">
    <button onclick="calcV()">Calcular</button>
  </div>`);
}

function calcV(){
  let v=normaliza(document.getElementById('vv').value);
  let p=parseInt(document.getElementById('pv').value);

  valor=v;
  parcelaFinal=(v*(1+TAXA_VEICULO))/p;

  bot(`💰 Parcela: <b>${moeda(parcelaFinal)}</b>
  <div class="buttons">
    <button class="whatsapp" onclick="zap()">📲 Falar no WhatsApp</button>
  </div>`);
}

function zap(){

  if(!tipo){
    alert("Selecione o tipo!");
    return;
  }

  let msg = `Olá! 👋
Meu nome é ${nome}

📱 WhatsApp: ${fone}
📊 Tipo: ${tipo}
💰 Crédito: ${moeda(valor)}
📉 Parcela: ${moeda(parcelaFinal)}

Gostaria de mais informações.`;

  window.open("https://api.whatsapp.com/send?phone=5581920023267&text=" + encodeURIComponent(msg));
}

</script>
</body>
</html>
